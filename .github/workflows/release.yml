name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            name: linux-x86_64
            artifact: open-game-portal
          - os: macos-latest
            name: macos-arm64
            artifact: open-game-portal
          - os: windows-latest
            name: windows-x86_64
            artifact: open-game-portal.exe

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --config Release

      - name: Package (Unix)
        if: runner.os != 'Windows'
        run: |
          cd build
          tar czf open-game-portal-${{ matrix.name }}.tar.gz ${{ matrix.artifact }}

      - name: Package (Windows)
        if: runner.os == 'Windows'
        run: |
          cd build/Release
          Compress-Archive -Path ${{ matrix.artifact }} -DestinationPath ../open-game-portal-${{ matrix.name }}.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: open-game-portal-${{ matrix.name }}
          path: build/open-game-portal-${{ matrix.name }}.*

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: dist/*
